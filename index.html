<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRABIN e FRANCESCA</title>

  <!-- Font eleganti -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Playfair Display', serif;
      background: #f9f6f2;
      color: #333;
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    h1 {
      color: #b48a78;
      margin-bottom: 3px;
      line-height: 1.2;
    }

    .names {
      font-size: 2.2em;
    }

    .and {
      font-family: 'Great Vibes', cursive;
      font-size: 1.5em;
      display: block;
      margin: 5px 0;
    }

    .section {
      margin: 10px 0;
    }

    .iban {
      font-weight: bold;
      font-size: 1.1em;
      background: #f1ece8;
      padding: 10px;
      border-radius: 8px;
      word-break: break-all;
      margin-bottom: 10px;
    }

    button {
      background: #b48a78;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9em;
    }

    button:hover {
      background: #9f6f5e;
    }
  </style>
</head>
<body>
  <div class="container">

    <h1 class="names">
      PRABIN
      <span class="and">e</span>
      FRANCESCA
    </h1>

    <div class="section">
      <p>25 SETTEMBRE 2026</p>
    </div>

    <div class="section">
       <p style="font-family: 'Great Vibes', sans-serif; font-size: 30px;">
  <strong>Grazie di cuore!</strong>
      <p>
        La vostra presenza è il dono più importante per noi.
        Se desiderate contribuire alla nostra luna di miele,
        trovate qui sotto i dettagli.
      </p>
    </div>

    <div class="section">
      <p><strong>IBAN:</strong></p>
      <div class="iban" id="ibanText">IT63A0347501605CC0012755144</div>
      <button onclick="copyIban()">📋 Copia IBAN</button>
    </div>

  </div>

  <script>
    function copyIban() {
      const iban = document.getElementById('ibanText').innerText;

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(iban)
          .then(() => alert('IBAN copiato!'))
          .catch(() => fallbackCopy(iban));
      } else {
        fallbackCopy(iban);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();

      try {
        document.execCommand('copy');
        alert('IBAN copiato!');
      } catch (e) {
        alert('Errore nella copia');
      }

      document.body.removeChild(textarea);
    }
  </script>

</body>
</html>
